<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>管理者画面 ｜ 管工事1級 学科試験 一問一答</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="blueprint-grid" aria-hidden="true"></div>

<header class="topbar">
  <div class="topbar__title">
    <span class="topbar__eyebrow">1級管工事施工管理技士</span>
    <h1>管理者画面</h1>
  </div>
</header>

<div class="user-bar" id="userBar" hidden>
  <span class="user-bar__label" id="userLabel"></span>
  <a class="text-btn" href="index.html">クイズに戻る</a>
  <button class="text-btn" id="btnLogout">ログアウト</button>
</div>

<main class="stage stage--wide">

  <div class="card" id="statusCard">
    <p id="statusText">読み込み中...</p>
    <a class="chip-btn" href="index.html" id="statusLink" hidden>クイズ画面へ</a>
  </div>

  <div class="panel" id="adminPanel" hidden>
    <section class="panel__section">
      <div class="panel__tag">社員の学習状況</div>
      <div class="admin-table-wrap">
        <table class="admin-table" id="adminTable">
          <thead>
            <tr>
              <th>社員番号</th>
              <th>権限</th>
              <th>進捗</th>
              <th>正答率</th>
              <th>間違えた問題</th>
              <th>最終更新</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="adminTableBody"></tbody>
        </table>
      </div>
    </section>
  </div>

</main>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/firebase-init.js"></script>
<script src="js/questions.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
