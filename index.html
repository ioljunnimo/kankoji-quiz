<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>管工事1級 学科試験 一問一答</title>
<meta name="description" content="1級管工事施工管理技士 学科試験対策。○×形式の一問一答で388問を演習できます。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="blueprint-grid" aria-hidden="true"></div>

<header class="topbar">
  <div class="topbar__title">
    <span class="topbar__eyebrow">1級管工事施工管理技士</span>
    <h1>学科試験 一問一答</h1>
  </div>
  <div class="gauge" id="gauge" role="img" aria-label="正答率ゲージ">
    <svg viewBox="0 0 120 72" class="gauge__svg">
      <path d="M10,66 A50,50 0 0 1 110,66" class="gauge__track"/>
      <path d="M10,66 A50,50 0 0 1 110,66" class="gauge__fill" id="gaugeFill"/>
      <line x1="60" y1="66" x2="60" y2="24" class="gauge__needle" id="gaugeNeedle"/>
      <circle cx="60" cy="66" r="4" class="gauge__hub"/>
    </svg>
    <div class="gauge__reading">
      <span class="gauge__pct" id="gaugePct">0%</span>
      <span class="gauge__label">正答率</span>
    </div>
  </div>
</header>

<div class="user-bar" id="userBar" hidden>
  <span class="user-bar__label" id="userLabel"></span>
  <a class="text-btn" id="adminLink" href="admin.html" hidden>管理者画面</a>
  <button class="text-btn" id="btnLogout">ログアウト</button>
</div>

<div class="auth-gate" id="authGate" hidden>
  <div class="card auth-card">
    <div class="card__tag">LOGIN</div>
    <h2 id="authTitle">ログイン</h2>
    <form id="authForm">
      <label class="auth-field">
        <span>社員番号</span>
        <input type="text" id="authEmployeeId" autocomplete="username" required>
      </label>
      <label class="auth-field">
        <span>パスワード</span>
        <input type="password" id="authPassword" autocomplete="current-password" required minlength="6">
      </label>
      <p class="auth-error" id="authError" hidden></p>
      <button type="submit" class="next-btn" id="authSubmit">ログイン</button>
    </form>
    <button class="text-btn" id="authToggleMode">アカウントをお持ちでない方はこちら（新規登録）</button>
  </div>
</div>

<div id="appContent" hidden>

<main class="stage">

  <div class="toast" id="saveToast"></div>

  <div class="mode-banner" id="modeBanner" hidden>
    復習モード：間違えた問題のみ出題中
    <button class="text-btn" id="btnExitReview">通常モードに戻る</button>
  </div>

  <div class="progress-rail" aria-hidden="true">
    <div class="progress-rail__fill" id="progressFill"></div>
  </div>
  <div class="progress-text" id="progressText">問題 1 / 388</div>

  <section class="card" id="quizCard">
    <div class="card__meta">
      <div class="card__tag" id="questionTag">Q-001</div>
      <div class="card__streak" id="questionStreak" aria-label="連続正解" hidden></div>
    </div>
    <p class="card__question" id="questionText">読み込み中...</p>

    <div class="answer-row" id="answerRow">
      <button class="answer-btn answer-btn--true" id="btnTrue" data-value="true">
        <span class="answer-btn__mark">○</span>
        <span class="answer-btn__label">正しい</span>
      </button>
      <button class="answer-btn answer-btn--false" id="btnFalse" data-value="false">
        <span class="answer-btn__mark">×</span>
        <span class="answer-btn__label">誤り</span>
      </button>
    </div>

    <div class="result" id="result" hidden>
      <div class="result__banner" id="resultBanner"></div>
      <p class="result__exp" id="resultExp"></p>
      <button class="next-btn" id="btnNext">次の問題 →</button>
    </div>
  </section>

  <div class="card card--summary" id="summaryCard" hidden>
    <p class="card__tag">RESULT</p>
    <h2>お疲れさまでした</h2>
    <p class="summary__score"><span id="summaryCorrect">0</span> / <span id="summaryTotal">388</span> 問正解</p>
    <p class="summary__rate" id="summaryRate">正答率 0%</p>
    <div class="summary__actions">
      <button class="next-btn" id="btnRestart">最初からやり直す</button>
      <button class="chip-btn" id="btnReviewFromSummary">間違えた問題だけ復習する（<span id="summaryWrongCount">0</span>問）</button>
    </div>
  </div>

  <div class="card card--summary" id="reviewSummaryCard" hidden>
    <p class="card__tag">REVIEW</p>
    <h2>復習完了</h2>
    <p class="summary__rate" id="reviewSummaryText"></p>
    <div class="summary__actions">
      <button class="next-btn" id="btnReviewAgain">残りの苦手問題をもう一周</button>
      <button class="text-btn" id="btnExitReviewFromSummary">通常モードに戻る</button>
    </div>
  </div>

  <div class="panel" id="mainControls">
    <section class="panel__section">
      <div class="panel__tag">セーブポイント</div>
      <div class="panel__row">
        <input type="number" id="savepointInterval" class="savepoint__input" min="1" max="388" placeholder="-">
        <span class="panel__hint">問ごとに自動セーブ</span>
      </div>
      <div class="panel__row">
        <button class="chip-btn" id="btnSaveHere">ここでセーブ</button>
        <button class="text-btn" id="btnClearSavepoint">解除</button>
      </div>
      <p class="panel__status" id="savepointCurrent" hidden></p>
    </section>

    <div class="panel__divider" aria-hidden="true"></div>

    <section class="panel__section">
      <button class="chip-btn chip-btn--block" id="btnReviewWrong">間違えた問題だけ復習する（<span id="wrongCount">0</span>問）</button>
    </section>

    <div class="panel__divider" aria-hidden="true"></div>

    <section class="panel__section">
      <button class="text-btn text-btn--danger" id="btnReset">進捗をリセット</button>
    </section>
  </div>

</main>

<footer class="footer">
  <p id="footerText">全388問・○×形式 ／ 学習の進み具合はアカウントに自動保存されます</p>
</footer>

</div>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/firebase-init.js"></script>
<script src="js/auth.js"></script>
<script src="js/questions.js"></script>
<script src="js/app.js"></script>
</body>
</html>
